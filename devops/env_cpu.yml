name: robust_dta_env
channels:
  - pytorch
  - pyg
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip

  # Core ML
  - pytorch>=2.0
  - torchvision
  - torchaudio
  - cpuonly                       # swap for pytorch-cuda=12.1 if you have a GPU

  # PyTorch Geometric
  - pyg::pyg>=2.4

  # Chemistry
  - conda-forge::rdkit>=2023.03

  # Scientific stack
  - numpy>=1.24
  - pandas>=2.0
  - scikit-learn>=1.3
  - scipy>=1.11
  - matplotlib>=3.7

  # Utilities
  - tqdm
  - jupyter
  - ipykernel

  # Pip-only packages
  - pip:
    - fair-esm>=2.0               # ESM-2 protein embeddings (Phase 2)
    - lifelines>=0.27             # concordance_index (Phase 3 eval)
